    receipt:
      result: done
      task_id: T001
      board_path: "/Users/neonwatty/Desktop/lineage-landing/docs/goals/hero-surface-viewport-rework/state.yaml"
      summary: "Mapped current PR #2 hero geometry. The failure is structural: a 1440x1304 screenshot is forced into a 16:9 frame with object-fit cover, exposing only about 62.1% of the source height while marker x/y values are applied as cropped-frame percentages. Controls also overlap the content area, and mobile repeats the same crop/marker problem."
      evidence:
        - "public/swissifier-lineage-app.png and public/swissifier-lineage-json.png are both 1440x1304."
        - "src/app/globals.css:276-286 sets .compare-frame to aspect-ratio 16 / 9 and .compare-image to object-fit: cover; object-position: left top."
        - "src/components/landing/hero-scenario-player.tsx:195-200 applies marker left/top directly from scenario x/y percentages."
        - "src/components/landing/hero-scenario-player.tsx:304-318 applies connector endpoints from the same frame percentages."
        - "Desktop browser geometry: frame 1118x628.875, visible source height 810px, 62.1166% of source screenshot height."
        - "Mobile browser geometry: frame 391.109x220, visible source height about 810px, 62.1168% of source screenshot height."
