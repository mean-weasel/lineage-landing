          rank: 1
          rationale: "Best matches the oracle: markers can be placed in source coordinates, playback can center relevant targets, scrubber remains the main comparison affordance, and users need not manually scroll to understand the flow."
        - model: "Manual scrollable visual and agent panes inside the compare frame"
          rank: 2
          rationale: "Gives inspectability, but conflicts with full-frame scrubber input unless pointer-event and gesture ownership are redesigned; risks making the hero feel like a tiny embedded app."
        - model: "Taller frame/aspect-ratio only"
          rank: 3
          rationale: "Improves crop but does not solve coordinate truth, control overlap, or agent JSON centering."
        - model: "Percentage-only marker retune"
          rank: 4
          rationale: "Fastest but least truthful; Scout evidence contradicts it as a sufficient fix."
      commands:
        - cmd: "sips -g pixelWidth -g pixelHeight public/swissifier-lineage-app.png public/swissifier-lineage-json.png"
          status: pass
        - cmd: "Browser geometry measurement on http://lineage.localhost:3001/ for desktop 1280x720 and mobile 390x844"
          status: pass
      note_needed: false
