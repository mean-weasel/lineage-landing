        - "Those values are reproduced exactly as frame percentages in desktop and mobile browser measurements."
        - "Because the visible frame maps only the top 62.1% of the source screenshot height, frame-percent y positions do not correspond to source-image y positions."
        - "The current Play/Reset controls overlap the frame on desktop and mobile; they sit in the screenshot/JSON content rather than in the toolbar."
        - "The compare-range input covers the entire frame at z-index 8, so adding direct manual scroll inside the same frame would conflict unless the interaction layering is redesigned."
        - "Mobile has no horizontal overflow and h2Count is 0, but the small 220px frame makes JSON and canvas state too cramped."
      contradictions:
        - "A percentage-only marker tweak would still be tied to the cropped frame rather than the real screenshot/canvas coordinate space."
        - "Simply making the frame taller would expose more source image, but it would not by itself fix controls covering content or scrubber/manual-scroll event conflicts."
      ambiguity_requiring_judge:
        - "Whether the Worker should implement auto-panned larger inner surfaces only, manual scroll plus auto-pan, or a taller aspect-ratio frame with coordinate correction."
