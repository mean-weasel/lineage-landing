# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hero Surface Viewport Rework"
  slug: "hero-surface-viewport-rework"
  kind: existing_plan
  tranche: "Repair PR #2 so the hero slider uses credible inspectable visual and agent surfaces with aligned markers, synchronized patch/child animation, reset, desktop/mobile proof, and no downstream landing content."
  status: active
  oracle:
    signal: "Desktop and mobile browser walkthrough of the Lineage landing hero shows enough of the visual app canvas and agent JSON to make the parent selection, JSON patch, and child creation spatially credible; markers align to real screenshot/canvas targets; Play/Reset and scrubber work; no overflow/framework errors; npm run lint and npm run build pass."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipt-backed lint/build results, browser screenshots or walkthrough notes for desktop and mobile, scrubber proof, Play/Reset proof, marker-alignment proof, no-downstream-content proof, and an updated PR URL."
  intake:
    original_request: "Create a detailed GoalBuddy prep board to fix the hero animation issues around misaligned pointers and cramped slider surfaces."
    interpreted_outcome: "Prepare a GoalBuddy board that will revise PR #2 into a credible inspectable hero slider with aligned visual markers and synchronized agent JSON behavior."
    input_shape: existing_plan
    audience: "Lineage landing page visitors and PR #2 reviewers"
    authority: requested
    proof_type: demo
    completion_proof: "The active PR contains the reworked hero surface model with passing verification and browser proof on desktop/mobile."
    likely_misfire: "Only tweaking overlay percentages or enlarging the frame without solving the screenshot coordinate/crop model and control placement."
    blind_spots_considered:
      - "The source app screenshot is much taller than the current 16:9 frame."
      - "The current frame exposes only about 62% of the source screenshot height, based on prior browser geometry inspection."
      - "Markers must map to underlying screenshot/canvas coordinates rather than the visible crop."
      - "Manual scrolling inside the hero may be useful but should not become required to understand playback."
      - "Auto-pan/center behavior may better communicate the scenario while preserving a polished hero."
      - "Controls currently obscure screenshot/JSON content and may belong in the toolbar."
      - "Mobile must stay readable with no horizontal overflow."
      - "PR #2 is already open at https://github.com/mean-weasel/lineage-landing/pull/2."
    existing_plan_facts:
      - "Keep the landing page hero-only."
      - "Preserve the visual/agent comparison slider."
      - "Keep the scenario data-driven, recorded-prompt based, and resettable."
      - "Current PR #2 adds a write-json phase, JSON line highlights, queued connectors, preview children, and reduced-motion CSS."
      - "Independent review judged PR #2 structurally promising but visually not good enough yet."
      - "Recommended direction: treat the compare frame as a viewport into larger surfaces, auto-pan to relevant regions during playback, center highlighted JSON lines, move controls out of content, and preserve scrubber behavior."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/hero-surface-viewport-rework/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.0/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/hero-surface-viewport-rework"

