# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hero Scenario Player"
  slug: "hero-scenario-player"
  kind: existing_plan
  tranche: "Deliver PR 1 for a simple data-driven Lineage hero scenario player with parent selection, recorded prompt, child creation, synchronized agent/JSON state, reset, verification, and PR creation."
  status: active
  oracle:
    signal: "Desktop and mobile browser walkthrough of the Lineage landing hero shows the in-image scrubber still working, parent selection, recorded prompt, two child nodes appearing, synchronized agent/JSON update, reset removing child nodes, no downstream content, and passing npm run lint plus npm run build."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipt-backed lint/build results, browser screenshots or walkthrough notes for desktop and mobile, reset proof, no downstream-section proof, and pushed PR URL."
  intake:
    original_request: "Plan a repeatable GoalBuddy-backed implementation for the hero visual slider with recorded prompts, child node creation, and reset."
    interpreted_outcome: "Create a PR-ready repeatable hero scenario player that demonstrates a simple human/agent collaboration flow in the existing slider."
    input_shape: existing_plan
    audience: "Lineage landing page visitors and the developer iterating on the hero demo"
    authority: requested
    proof_type: demo
    completion_proof: "A PR branch contains the implemented hero scenario player, passing verification, screenshots/walkthrough evidence, and a PR URL."
    likely_misfire: "Building a bespoke flashy animation, adding extra landing content, or hardcoding demo behavior instead of creating a simple repeatable scenario system."
    blind_spots_considered:
      - "Hero must stay hero-only."
      - "Scrubber position and scenario timeline must remain separate concerns."
      - "Prompt must be recorded in data for repeatability."
      - "Reset must actually remove child nodes from demo state."
      - "Mobile readability and no overflow are part of done."
      - "PR 1 should avoid real backend or agent execution."
    existing_plan_facts:
      - "Create branch codex/hero-scenario-player before implementation."
      - "Create src/lib/hero-scenario.ts for parent, prompt, children, and ordered steps."
      - "Keep the current real Swissifier visual screenshot and add overlays for parent/children."
      - "Use rendered JSON/text for agent-side state so updates can be highlighted later."
      - "Add Play and Reset controls; Step is optional only if useful during development."
      - "Keep landing page hero-only and preserve the in-image scrubber."
      - "Defer complex animation polish and line/key highlighting to a later PR."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/hero-scenario-player/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.4.0/skills/goal-prep/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/hero-scenario-player"

active_task: T005

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map the existing hero implementation and identify the smallest safe scenario-player design that preserves the current hero-only scrubber."
    inputs:
      - "src/app/page.tsx"
      - "src/components/landing/lineage-hero.tsx"
      - "src/app/globals.css"
      - "public/swissifier-lineage-tree.json"
      - "Current user plan in docs/goals/hero-scenario-player/goal.md"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not broaden beyond the hero."
      - "Prefer concrete file-path evidence and exact component/data boundaries."
    expected_output:
      - "Current hero/scrubber map."
      - "Recommended scenario data shape and exact first implementation slice."
      - "Risks for mobile/readability/reset."
      - "Verification commands and browser proof plan."
    receipt:
      result: done
      summary: "Mapped the current hero-only scrubber and identified a safe PR 1 slice: add a data-driven scenario player inside the existing compare frame, with visual overlays, rendered agent JSON, Play/Reset controls, and no downstream page content."
      evidence:
        - "src/app/page.tsx:29 shows the page renders only LineageHero inside main."
        - "src/components/landing/lineage-hero.tsx:15-114 owns the current hero, scrubber state, screenshot layers, invisible in-image range, divider tab, and labels."
        - "src/app/globals.css:250-363 defines compare shell/frame, image overlay, in-image range, divider tab, and badges."
        - "public/swissifier-lineage-tree.json contains 14 nodes, 13 edges, root local-5748fb8ba6df, selected next bases local-27050bc5c393 and local-6d06bdbd9f56."
        - "public/swissifier-lineage-app.png and public/swissifier-lineage-json.png are matching 1440x1304 screenshots."
      recommended_slice:
        data_shape:
          - "HeroAssetNode: id, title, kind, parentId, x, y, status/selected metadata."
          - "HeroPromptRecord: id, label, prompt."
          - "HeroScenarioStep: idle, select-parent, show-prompt, create-children, reset."
          - "HeroScenario: parent, children, prompts, steps."
        component_boundary:
          - "Keep LineageHero as the hero shell and scrubber owner."
          - "Add scenario data in src/lib/hero-scenario.ts."
          - "Add a client scenario player component under src/components/landing/ that renders visual overlays and agent JSON inside the existing compare-frame."
        first_worker_slice: "Implement the complete PR 1 scenario player in one vertical slice: data file, player component, LineageHero integration, CSS, Play/Reset controls, scenario-derived JSON update, visual child overlays, reset behavior, verification."
      risks:
        - "Rendered JSON must stay legible inside the clipped agent side on mobile."
        - "Scenario controls must not fight the full-frame invisible scrubber range."
        - "Reset must clear child overlays and JSON children, not merely hide a CSS class."
        - "Do not add downstream explanatory sections to compensate for unclear hero behavior."
      verification_plan:
        - "npm run lint"
        - "npm run build"
        - "Browser proof on desktop and mobile: two images/surfaces load, no horizontal overflow, in-image scrubber moves, Play creates children and updates JSON, Reset removes children, h2Count remains 0."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the Scout plan and specify the largest safe Worker slice for PR 1."
    inputs:
      - "T001 receipt"
      - "docs/goals/hero-scenario-player/goal.md"
    constraints:
      - "Do not implement."
      - "Reject tasks that add downstream landing content."
      - "Keep PR 1 simple and data-driven."
      - "Specify allowed_files, verify commands, and stop_if conditions for Worker."
    expected_output:
      - "Decision on implementation approach."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "The Scout slice is appropriately bounded: it preserves the hero-only page and in-image scrubber while adding the smallest repeatable scenario mechanism that proves parent selection, recorded prompt, child creation, synchronized JSON, and reset."
      worker_package:
        objective: "Implement PR 1 for the hero scenario player: scenario data, resettable player state, visual overlays, rendered agent JSON, Play/Reset controls, and LineageHero integration without adding downstream sections."
        allowed_files:
          - "src/lib/hero-scenario.ts"
          - "src/components/landing/hero-scenario-player.tsx"
          - "src/components/landing/lineage-hero.tsx"
          - "src/app/globals.css"
        verify:
          - "npm run lint"
          - "npm run build"
          - "Browser proof on desktop and mobile for scrubber, Play, Reset, no downstream sections, and no overflow."
        stop_if:
          - "Need files outside allowed_files."
          - "Scenario requires backend calls or real agent execution."
          - "Controls conflict with the in-image scrubber in a way that cannot be resolved locally."
          - "Reset semantics are ambiguous or cannot be proven."
          - "Verification fails twice."
      blocked_tasks: []
  - id: T003
